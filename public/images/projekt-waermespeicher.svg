<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Beispielbild Wärmespeicher-Montage">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/><stop offset="1" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="tank3" x1="320" y1="120" x2="480" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fcd34d"/><stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <g stroke="#94a3b8" stroke-opacity="0.08">
    <path d="M0 150H800M0 300H800M0 450H800M200 0V600M400 0V600M600 0V600"/>
  </g>
  <rect y="470" width="800" height="130" fill="#0a0f1d"/>
  <line x1="0" y1="470" x2="800" y2="470" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2"/>
  <!-- hoher Wärmespeicher -->
  <rect x="330" y="130" width="140" height="340" rx="70" fill="url(#tank3)"/>
  <ellipse cx="400" cy="130" rx="70" ry="24" fill="#fde68a"/>
  <!-- Dämmung-Ringe -->
  <g stroke="#0a0f1d" stroke-opacity="0.4" stroke-width="6">
    <line x1="332" y1="210" x2="468" y2="210"/><line x1="332" y1="290" x2="468" y2="290"/><line x1="332" y1="370" x2="468" y2="370"/>
  </g>
  <!-- Anschlüsse -->
  <rect x="470" y="190" width="70" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="470" y="380" width="70" height="14" rx="7" fill="#cbd5e1"/>
  <!-- Wärme-Wellen -->
  <g stroke="#f59e0b" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round">
    <path d="M250 250C270 230 270 270 290 250"/>
    <path d="M250 300C270 280 270 320 290 300"/>
  </g>
  <g transform="translate(40 40)">
    <rect width="210" height="40" rx="20" fill="#0a0f1d" fill-opacity="0.7" stroke="#f59e0b" stroke-opacity="0.4"/>
    <circle cx="24" cy="20" r="6" fill="#f59e0b"/>
    <text x="42" y="26" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fbbf24">Wärmespeicher</text>
  </g>
  <text x="40" y="560" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Beispielbild · durch echtes Projektfoto ersetzen</text>
</svg>
